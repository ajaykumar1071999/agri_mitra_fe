name: React CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # ✅ FIXED

      - name: Install Dependencies
        run: npm ci

      - name: Skip Tests
        run: echo "Skipping tests"

      - name: Build App
        run: npm run build
